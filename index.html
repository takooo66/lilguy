<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="lil guy">
<title>lil guy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background:#000;
  font-family:'DM Mono',monospace;
  height:100dvh;
  overflow:hidden;
  user-select:none;
}

.c {
  position:fixed;
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#1a1a1a;
  z-index:30;
}
.tl { top:max(16px,env(safe-area-inset-top));       left:16px; }
.tr { top:max(16px,env(safe-area-inset-top));       right:16px; text-align:right; }
.bl { bottom:max(20px,env(safe-area-inset-bottom)); left:16px; }
.br { bottom:max(20px,env(safe-area-inset-bottom)); right:16px; text-align:right; }

#clock {
  position:fixed;
  bottom:max(48px,env(safe-area-inset-bottom));
  left:0; right:0;
  text-align:center;
  font-size:clamp(60px,20vw,110px);
  letter-spacing:-4px;
  opacity:0.025;
  pointer-events:none;
  color:#fff;
  z-index:1;
}

.cam-btn {
  position:fixed;
  top:max(14px,env(safe-area-inset-top));
  left:50%;
  transform:translateX(-50%);
  z-index:40;
  background:transparent;
  border:1px solid #1a1a1a;
  color:#333;
  width:26px; height:26px;
  font-size:10px;
  border-radius:50%;
  cursor:pointer;
  font-family:'DM Mono',monospace;
  line-height:1;
  padding:0;
  transition:all 0.3s;
}
.cam-btn.on { border-color:#c4892a; color:#c4892a; }
.cam-btn.loading { opacity:0.5; }

.wake-btn {
  position:fixed;
  top:max(46px,calc(env(safe-area-inset-top) + 32px));
  left:50%;
  transform:translateX(-50%);
  z-index:40;
  background:transparent;
  border:1px solid #1a1a1a;
  color:#333;
  width:26px; height:26px;
  font-size:11px;
  border-radius:50%;
  cursor:pointer;
  font-family:'DM Mono',monospace;
  line-height:1;
  padding:0;
  transition:all 0.3s;
}
.wake-btn.on { border-color:#c4892a; color:#c4892a; }

#eyeWrap {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
  width:min(320px,85vw);
}
#eyeWrap svg { width:100%; height:auto; display:block; }
</style>
</head>
<body>

<!-- Gyro permission tap — shown once on iOS, hidden after grant -->
<div id="gyroHint" style="
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:max(40px,env(safe-area-inset-bottom));
  pointer-events:none;
">
  <span style="
    font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
    text-transform:uppercase;color:#333;
  ">tap to enable gyro</span>
</div>

<video id="camVid" playsinline muted style="display:none"></video>
<button id="camBtn" class="cam-btn" title="eye contact">◯</button>
<button id="wakeBtn" class="wake-btn" title="wake up">z</button>
<div id="camErr" style="position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:50;font-family:'DM Mono',monospace;font-size:9px;color:#c4892a;text-align:center;max-width:80vw;display:none;pointer-events:none;letter-spacing:1px;"></div>

<div class="c tl">LIL GUY</div>
<div class="c tr" id="cTR">—</div>
<div class="c bl" id="cBL">—</div>
<div class="c br" id="cBR">—</div>
<div id="clock">00:00</div>

<!-- Eyes -->
<div id="eyeWrap">
<svg viewBox="0 0 320 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft glow — active during peak / still up -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft edge for sclera — blends into black bg -->
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>

    <!-- Almond clip paths. Eye spans y=28..102 (h=74), center y=70 -->
    <clipPath id="cL">
      <path d="M20 70 C35 28,115 28,130 70 C115 102,35 102,20 70Z"/>
    </clipPath>
    <clipPath id="cR">
      <path d="M190 70 C205 28,285 28,300 70 C285 102,205 102,190 70Z"/>
    </clipPath>
  </defs>

  <!-- Left eye -->
  <g id="gL">
    <path id="sL" d="M20 70 C35 28,115 28,130 70 C115 102,35 102,20 70Z" fill="#989898" stroke="#000" stroke-width="3"/>
    <g clip-path="url(#cL)">
      <ellipse id="iL" cx="75"  cy="70" rx="22" ry="22" fill="#c4892a"/>
      <ellipse id="pL" cx="75"  cy="70" rx="5" ry="28" fill="#060606"/>
      <rect    id="uL" x="18"  y="28"  width="114" height="0" fill="#000"/>
      <rect    id="lL" x="18"  y="102" width="114" height="0" fill="#000"/>
    </g>
  </g>

  <!-- Right eye -->
  <g id="gR">
    <path id="sR" d="M190 70 C205 28,285 28,300 70 C285 102,205 102,190 70Z" fill="#989898" stroke="#000" stroke-width="3"/>
    <g clip-path="url(#cR)">
      <ellipse id="iR" cx="245" cy="70" rx="22" ry="22" fill="#c4892a"/>
      <ellipse id="pR" cx="245" cy="70" rx="5" ry="28" fill="#060606"/>
      <rect    id="uR" x="188" y="28"  width="114" height="0" fill="#000"/>
      <rect    id="lR" x="188" y="102" width="114" height="0" fill="#000"/>
    </g>
  </g>
</svg>
</div>

<!-- Film grain overlay — sits above everything -->
<svg style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:50;"
     xmlns="http://www.w3.org/2000/svg">
  <filter id="gf" x="0" y="0" width="100%" height="100%"
          color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.68"
                  numOctaves="4" seed="5" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#gf)" fill="white" opacity="0.055"/>
</svg>

<script>
// ── Life states mapped to user's actual schedule ─────────────────
// upH  — upper lid height from y=28 downward  (0=open, 74=closed)
// loH  — lower lid height from y=102 upward   (0=open)
// pupRy — pupil vertical radius (28=wide, 7=asleep sliver)
var LIFE = [
  { r:[0,4],   label:'still up', upH:6,  loH:3,  pupRy:26, fill:'#989898', glow:true  },
  { r:[4,12],  label:'zzz',      upH:68, loH:0,  pupRy:7,  fill:'#282828', glow:false },
  { r:[12,16], label:'meh',      upH:36, loH:14, pupRy:16, fill:'#585858', glow:false },
  { r:[16,21], label:'warming',  upH:10, loH:4,  pupRy:22, fill:'#808080', glow:false },
  { r:[21,24], label:'peak',     upH:0,  loH:0,  pupRy:28, fill:'#b0b0b0', glow:true  },
];

var BREATH = { zzz:6000, meh:4500, 'still up':3800, warming:3800, peak:3200 };
// Gaze spring params per state: [stiffness, damping]
var GAZE_SPRING = { zzz:[0.07,0.88], meh:[0.10,0.80], warming:[0.13,0.75], 'still up':[0.16,0.70], peak:[0.20,0.66] };

function getLife(h) {
  for (var i = 0; i < LIFE.length; i++)
    if (h >= LIFE[i].r[0] && h < LIFE[i].r[1]) return LIFE[i];
  return LIFE[3];
}

var currentLife = getLife(new Date().getHours());

// DOM refs
var sL=document.getElementById('sL'), sR=document.getElementById('sR');
var pL=document.getElementById('pL'), pR=document.getElementById('pR');
var iL=document.getElementById('iL'), iR=document.getElementById('iR');
var uL=document.getElementById('uL'), uR=document.getElementById('uR');
var lL=document.getElementById('lL'), lR=document.getElementById('lR');
var gL=document.getElementById('gL'), gR=document.getElementById('gR');
var cTR=document.getElementById('cTR'), cBR=document.getElementById('cBR');
var clockEl=document.getElementById('clock');

// ── Animated display values ──────────────────────────────────────
// Lids: independent L/R for wink support
var dUpHL=0, dUpHR=0, tUpH=0;
var dLoH=0, tLoH=0;
// Pupil: rx for dilation, ry for open/closed state
var dPupRy=28, tPupRy=28;
var dPupRx=5,  tPupRx=5;
// Gaze: independent L/R for two-finger cross-eye mode
var dGazeXL=0, dGazeYL=0, tGazeXL=0, tGazeYL=0;
var dGazeXR=0, dGazeYR=0, tGazeXR=0, tGazeYR=0;
var gazeVelXL=0, gazeVelYL=0, gazeVelXR=0, gazeVelYR=0;
// Gyro base gaze
var gyroX=0, gyroY=0, gyroReady=false;
var dGyroX=0, dGyroY=0, gyroVelX=0;
// Mouse base gaze (desktop + lazy touch)
var mouseGazeX=0, mouseGazeY=0;
// Head tilt + post-blink wobble
var dTilt=0, tTilt=0;
var blinkWobble=0, blinkWobbleTarget=0;

function startGyro() {
  gyroReady = true;
  document.getElementById('gyroHint').style.display = 'none';
  window.addEventListener('deviceorientation', function(e) {
    gyroX = Math.max(-25, Math.min(25, (e.gamma || 0) * 1.2));
  });
}

// iOS requires requestPermission() called directly inside a user gesture handler
document.addEventListener('touchend', function handler() {
  document.removeEventListener('touchend', handler);
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(function(s) {
      if (s === 'granted') startGyro();
    }).catch(function(){});
  } else {
    startGyro();
  }
}, { once: true });

// State flags
var isWinkingL=false, isWinkingR=false;
var isSurprised=false, isLongPressing=false, isTouching=false;
var isExpressing=false, tapCount=0, tapResetTimer=null, jitomeTimer=null;
// Idle doze
var lastInteractTime=Date.now(), dozeExtra=0;
// Petting accumulation
var petScore=0, lastPetTime=0;
// Lid async per-eye filters
var tUpHL_f=0, tUpHR_f=0, lidAlphaL=0.6, lidAlphaR=0.6;
// Nystagmus (zzz only)
var nysOffset=0, nysDir=1, nysSnapping=false, nysTarget=5;
// Iris size animation
var dIrisRy=28, tIrisRy=28;
// Weather modifier (Tokyo)
var weatherMod = { upHOffset:0, pupRyOffset:0 };
var eyeWrap=document.getElementById('eyeWrap');

function lerp(a, b, t) { return a + (b-a)*t; }

function applyLids() {
  uL.setAttribute('height', dUpHL); uR.setAttribute('height', dUpHR);
  lL.setAttribute('height', dLoH);  lR.setAttribute('height', dLoH);
  lL.setAttribute('y', 102-dLoH);   lR.setAttribute('y', 102-dLoH);
}

function applyLife(life) {
  tUpH   = life.upH + dozeExtra + weatherMod.upHOffset;
  tLoH   = life.loH;
  tPupRy = Math.max(5, life.pupRy + weatherMod.pupRyOffset);
  tIrisRy = 28;
  sL.setAttribute('fill', life.fill);
  sR.setAttribute('fill', life.fill);
  var gf = life.glow ? 'url(#glow)' : 'none';
  gL.setAttribute('filter', gf); gR.setAttribute('filter', gf);
  cTR.textContent = life.label;
}

// ── Blink / Wink ─────────────────────────────────────────────────
function blink(side) {
  if (!side) {
    if (isWinkingL || isWinkingR) return;
    isWinkingL = true; isWinkingR = true;
    // Randomize per-eye lid filter speed so L/R close/open at slightly different rates
    lidAlphaL = 0.45 + Math.random() * 0.40;
    lidAlphaR = 0.45 + Math.random() * 0.40;
    // Wind-up: small pre-droop 70ms before snap (biological pre-movement)
    dUpHL += 7; dUpHR += 7;
    setTimeout(function() {
      dUpHL = 74; dUpHR = 74;
      setTimeout(function() {
        isWinkingL = false; isWinkingR = false;
        blinkWobbleTarget = (Math.random() - 0.5) * 2.4;
        setTimeout(function() { blinkWobbleTarget = 0; }, 280);
      }, 85);
    }, 70);
  } else if (side === 'L') {
    if (isWinkingL) return;
    isWinkingL = true; dUpHL = 74;
    setTimeout(function() { isWinkingL = false; }, 85);
  } else {
    if (isWinkingR) return;
    isWinkingR = true; dUpHR = 74;
    setTimeout(function() { isWinkingR = false; }, 85);
  }
}

function scheduleBlink() {
  var label = currentLife.label;
  var d = label==='zzz'      ? 18000+Math.random()*22000
        : label==='peak'     ?   800+Math.random()*1400
        : label==='still up' ?  2000+Math.random()*3000
        : label==='meh'      ?  5000+Math.random()*4000
        :                       3000+Math.random()*3000;
  setTimeout(function() {
    if (Math.random() < 0.05) slowBlink();
    else {
      blink();
      if (Math.random() < 0.18) setTimeout(function(){ blink(); }, 230);
    }
    scheduleBlink();
  }, d);
}

// Cat slow blink (love blink) — gradual close/open via rAF
function slowBlink() {
  if (isWinkingL || isWinkingR) return;
  isWinkingL = true; isWinkingR = true;
  var startH = dUpHL, t0 = performance.now();
  (function closeStep() {
    var p = Math.min(1, (performance.now() - t0) / 520);
    var e = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
    dUpHL = dUpHR = startH + (74 - startH) * e;
    if (p < 1) { requestAnimationFrame(closeStep); return; }
    setTimeout(function() {
      var t1 = performance.now();
      (function openStep() {
        var q = Math.min(1, (performance.now() - t1) / 420);
        dUpHL = dUpHR = 74 * (1 - q);
        if (q < 1) requestAnimationFrame(openStep);
        else {
          isWinkingL = false; isWinkingR = false;
          blinkWobbleTarget = (Math.random() - 0.5) * 1.8;
          setTimeout(function() { blinkWobbleTarget = 0; }, 400);
        }
      })();
    }, 130);
  })();
}

// Curiosity head tilt — random small rotation
function scheduleHeadTilt() {
  setTimeout(function() {
    tTilt = (Math.random() - 0.5) * 7;
    setTimeout(function() { tTilt = 0; scheduleHeadTilt(); },
      1200 + Math.random() * 2000);
  }, 5000 + Math.random() * 10000);
}

// ── Idle doze (3min no touch → lids droop) ───────────────────────
function dozeCheck() {
  if (isTouching || isSurprised) return;
  var idle = Date.now() - lastInteractTime;
  dozeExtra = idle > 180000
    ? Math.min(Math.round((idle - 180000) / 420000 * 22), 22)
    : 0;
  tUpH = currentLife.upH + dozeExtra + weatherMod.upHOffset;
}

// ── Weather (Open-Meteo, Tokyo, no API key) ───────────────────────
function applyWeatherMod(code, temp, isDay) {
  var upH = 0, pupRy = 0;
  if (code === 0) {
    upH = isDay ? -3 : 0; pupRy = isDay ? -1 : 0;
  } else if (code <= 3) {
    upH = 3;
  } else if (code >= 45 && code <= 48) {
    upH = 6; pupRy = 2;
  } else if (code >= 51 && code <= 67) {
    upH = 9; pupRy = 1;
  } else if (code >= 71 && code <= 77) {
    upH = -5; pupRy = 3;
  } else if (code >= 80 && code <= 82) {
    upH = 5; pupRy = 1;
  } else if (code >= 95) {
    upH = -6; pupRy = 5;
  }
  if (temp >= 33)      { upH += 8; }
  else if (temp <= 3)  { upH -= 4; pupRy -= 1; }
  weatherMod.upHOffset  = upH;
  weatherMod.pupRyOffset = pupRy;
  applyLife(currentLife);
}

function fetchWeather() {
  fetch('https://api.open-meteo.com/v1/forecast?latitude=35.68&longitude=139.69&current=temperature_2m,weather_code,is_day&timezone=Asia%2FTokyo')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var c = d.current;
      applyWeatherMod(c.weather_code, c.temperature_2m, c.is_day);
    })
    .catch(function() {});
}

// ── Touch → gaze offset (in SVG units) ──────────────────────────
function touchToGaze(tx, ty) {
  var rect = eyeWrap.getBoundingClientRect();
  var cx = rect.left + rect.width  * 0.5;
  var cy = rect.top  + rect.height * 0.5;
  var dx = tx - cx, dy = ty - cy;
  var dist = Math.sqrt(dx*dx + dy*dy) || 1;
  var maxD = Math.min(window.innerWidth, window.innerHeight) * 0.38;
  var s = Math.min(dist / maxD, 1);
  return { x: (dx/dist)*s*15, y: (dy/dist)*s*7 };
}

// Mouse gaze — throttled to one update per rAF frame
var _mouseMoveScheduled = false;
window.addEventListener('mousemove', function(e) {
  if (isTouching || _mouseMoveScheduled) return;
  _mouseMoveScheduled = true;
  requestAnimationFrame(function() {
    var g = touchToGaze(e.clientX, e.clientY);
    mouseGazeX = g.x * 0.35;
    mouseGazeY = g.y * 0.35;
    _mouseMoveScheduled = false;
  });
});

// ── Reactions ────────────────────────────────────────────────────
function doSurprise() {
  isSurprised = true;
  dUpHL = 0; dUpHR = 0; tUpH = 0; tLoH = 0; dLoH = 0;
  tPupRy = 14; tPupRx = 14;
  // Iris flash: constrict → expand → restore
  tIrisRy = 16;
  setTimeout(function() { tIrisRy = 32; }, 180);
  setTimeout(function() { tIrisRy = 28; }, 600);
  setTimeout(function() {
    isSurprised = false;
    applyLife(currentLife);
    tPupRx = 5;
  }, 900);
}

function doTapLook(tx, ty) {
  var g = touchToGaze(tx, ty);
  tGazeXL = g.x * 1.4; tGazeYL = g.y * 1.4;
  tGazeXR = g.x * 1.4; tGazeYR = g.y * 1.4;
  setTimeout(function() {
    blink();
    setTimeout(function() {
      if (!isTouching) { tGazeXL=0; tGazeYL=0; tGazeXR=0; tGazeYR=0; }
    }, 600);
  }, 200);
}

function doAffection() {
  if (isExpressing) return;
  isExpressing = true;
  tUpH = currentLife.upH + 14;
  tLoH = currentLife.loH + 6;
  tPupRy = 10; tPupRx = 8;
  tGazeYL = -7; tGazeYR = -7;
  tTilt = 4;
  slowBlink();
  setTimeout(function() {
    tUpH = currentLife.upH; tLoH = currentLife.loH;
    tPupRy = currentLife.pupRy; tPupRx = 5;
    tGazeYL = 0; tGazeYR = 0; tTilt = 0;
    isExpressing = false;
  }, 2200);
}

function doAnger() {
  if (isExpressing) return;
  isExpressing = true;
  tUpH = currentLife.upH + 22;
  tLoH = currentLife.loH + 18;
  tPupRy = 17; tPupRx = 2;
  tGazeYL = 5; tGazeYR = 5;
  tTilt = -5;
  setTimeout(function() {
    tUpH = currentLife.upH; tLoH = currentLife.loH;
    tPupRy = currentLife.pupRy; tPupRx = 5;
    tGazeYL = 0; tGazeYR = 0; tTilt = 0;
    isExpressing = false;
  }, 2000);
}

function doIgnore() {
  if (isExpressing) return;
  isExpressing = true;
  tGazeXL = -30; tGazeXR = -30;
  tGazeYL = -2;  tGazeYR = -2;
  tUpH = currentLife.upH + 8;
  setTimeout(function() {
    tGazeXL = 0; tGazeXR = 0;
    tGazeYL = 0; tGazeYR = 0;
    tUpH = currentLife.upH;
    isExpressing = false;
  }, 2500);
}

// ジト目 — 長押し1.5秒で散瞳からシフト。半目でじーっと正面を見る
function doJitome() {
  if (isExpressing) return;
  isExpressing = true;
  isLongPressing = false;
  tUpH = currentLife.upH + 24;  // 深めに落ちた上まぶた
  tLoH = currentLife.loH + 8;   // 下まぶたも少し上がる
  tPupRy = 12; tPupRx = 4;      // 細めだが完全スリットではない
  // 視線は正面固定（じーっと見る）
  tGazeXL = 0; tGazeXR = 0;
  tGazeYL = 0; tGazeYR = 0;
  tTilt = 0;
  setTimeout(function() {
    tUpH = currentLife.upH; tLoH = currentLife.loH;
    tPupRy = currentLife.pupRy; tPupRx = 5;
    isExpressing = false;
  }, 3500);
}

// ── Touch event handlers ─────────────────────────────────────────
var lastTapTime=0, longPressTimer=null;
var touchStartX=0, touchStartY=0, touchStartTime=0;

document.body.addEventListener('touchstart', function(e) {
  if (e.target.closest('button')) return;
  e.preventDefault();
  isTouching = true;
  if (dozeExtra > 0) { dozeExtra = 0; tUpH = currentLife.upH + weatherMod.upHOffset; }
  lastInteractTime = Date.now();
  var t = e.changedTouches[0];
  touchStartX = t.clientX; touchStartY = t.clientY;
  touchStartTime = Date.now();

  // Update base gaze — eyes drift toward finger with delay (capricious)
  var g = touchToGaze(t.clientX, t.clientY);
  mouseGazeX = g.x * 0.35; mouseGazeY = g.y * 0.35;

  // 500ms → 散瞳、さらに1000ms（計1.5s）→ ジト目
  longPressTimer = setTimeout(function() {
    isLongPressing = true;
    tPupRx = 17; tPupRy = 24;
    tIrisRy = 22;
  }, 500);
}, { passive:false });

document.body.addEventListener('touchmove', function(e) {
  if (e.target.closest('button')) return;
  e.preventDefault();
  if (!isTouching) return;

  if (e.touches.length >= 2) {
    // Two fingers: left finger → left eye, right finger → right eye (cross-eyed)
    var sorted = [e.touches[0], e.touches[1]].sort(function(a,b){ return a.clientX - b.clientX; });
    var gL2 = touchToGaze(sorted[0].clientX, sorted[0].clientY);
    var gR2 = touchToGaze(sorted[1].clientX, sorted[1].clientY);
    tGazeXL = gL2.x; tGazeYL = gL2.y;
    tGazeXR = gR2.x; tGazeYR = gR2.y;
  } else {
    var g = touchToGaze(e.touches[0].clientX, e.touches[0].clientY);
    mouseGazeX = g.x * 0.35; mouseGazeY = g.y * 0.35;
    // Petting: accumulate comfort score on continuous swipe
    lastPetTime = Date.now();
    petScore = Math.min(1, petScore + 0.04);
  }
}, { passive:false });

document.body.addEventListener('touchend', function(e) {
  if (e.target.closest('button')) return;
  e.preventDefault();
  clearTimeout(longPressTimer);
  clearTimeout(jitomeTimer);

  var t = e.changedTouches[0];
  var duration = Date.now() - touchStartTime;
  var dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
  var moved = Math.sqrt(dx*dx + dy*dy) > 12;

  if (isLongPressing) {
    isLongPressing = false;
    tPupRx = 5; tPupRy = currentLife.pupRy;
    tIrisRy = 28;
  } else if (!moved && duration < 300) {
    var now = Date.now();
    tapCount++;
    clearTimeout(tapResetTimer);
    tapResetTimer = setTimeout(function() { tapCount = 0; }, 450);

    if (tapCount === 2 && now - lastTapTime < 350) {
      doJitome();
      tapCount = 0; lastTapTime = 0;
    } else if (tapCount >= 3) {
      tapCount = 0; clearTimeout(tapResetTimer);
      var tx = t.clientX / window.innerWidth;
      if      (tx < 0.30) doAnger();
      else if (tx > 0.70) doIgnore();
      else                doAffection();
    } else {
      // Single tap: left edge → left wink, right edge → right wink, center → look+blink
      var sw = window.innerWidth;
      if      (t.clientX < sw * 0.2) blink('L');
      else if (t.clientX > sw * 0.8) blink('R');
      else                           doTapLook(t.clientX, t.clientY);
      lastTapTime = now;
    }
  }

  if (e.touches.length === 0) {
    isTouching = false;
    setTimeout(function() {
      if (!isTouching) { tGazeXL=mouseGazeX; tGazeYL=mouseGazeY; tGazeXR=mouseGazeX; tGazeYR=mouseGazeY; }
    }, 300);
  }
}, { passive:false });

// ── Auto gaze drift (idle, peak/still up states) ─────────────────
function scheduleAutoGaze() {
  setTimeout(function() {
    if (!isSurprised && !isExpressing) {
      var active = currentLife.label==='peak' || currentLife.label==='still up';
      var gx = active ? (Math.random()-0.5)*16 : 0;
      var clampX = Math.max(-12, Math.min(12, mouseGazeX + gx));
      var clampY = Math.max(-6,  Math.min(6,  mouseGazeY));
      tGazeXL = clampX; tGazeXR = clampX;
      tGazeYL = clampY; tGazeYR = clampY;
    }
    setTimeout(function() {
      if (!isSurprised && !isExpressing) {
        tGazeXL=mouseGazeX; tGazeXR=mouseGazeX; tGazeYL=mouseGazeY; tGazeYR=mouseGazeY;
      }
      scheduleAutoGaze();
    }, 1500+Math.random()*2500);
  }, 4000+Math.random()*8000);
}

// ── Breathing wave: inhale(30%) → hold(10%) → exhale(60%) ────────
function breathWave(t, period) {
  var phase = (t % period) / period;
  if (phase < 0.30) {
    var p = phase / 0.30;
    return p * p;
  } else if (phase < 0.40) {
    return 1.0;
  } else {
    var p = (phase - 0.40) / 0.60;
    return 1.0 - p * p;
  }
}

// ── Micro-saccades — smooth target shift (spring chases new position naturally) ──
var microSaccadePending = false;
function scheduleMicroSaccade() {
  setTimeout(function() {
    if (isTouching || isWinkingL || isSurprised || isExpressing || microSaccadePending) {
      scheduleMicroSaccade(); return;
    }
    microSaccadePending = true;
    // Move target slightly — spring physics handles smooth travel
    var sx = (Math.random() - 0.5) * 3.5;
    var sy = (Math.random() - 0.5) * 1.8;
    tGazeXL += sx; tGazeXR += sx;
    tGazeYL += sy; tGazeYR += sy;
    // Return to base after a short hold
    setTimeout(function() {
      if (!isTouching && !isSurprised && !isExpressing) {
        tGazeXL -= sx; tGazeXR -= sx;
        tGazeYL -= sy; tGazeYR -= sy;
      }
      setTimeout(function() { microSaccadePending = false; }, 200);
    }, 400 + Math.random() * 300);
    scheduleMicroSaccade();
  }, 3000 + Math.random() * 4000);
}

// ── Animation loop ───────────────────────────────────────────────
function loop() {
  // Force half-open lids when wake mode is on (ignore doze/time)
  if (awakeMode && !isSurprised && !isExpressing && !isWinkingL && !isWinkingR) {
    tUpH = 32; tLoH = 10;
  }

  // Petting — decay score when idle >2s, apply comfort expression
  var petDecay = (Date.now() - lastPetTime > 2000) ? 0.0003 : 0;
  petScore = Math.max(0, petScore - petDecay);
  if (petScore > 0 && !isExpressing && !isSurprised && !awakeMode) {
    tUpH = currentLife.upH + dozeExtra + weatherMod.upHOffset + petScore * 20;
    tLoH = currentLife.loH + petScore * 5;
    if (petScore > 0.3) { tGazeYL = petScore * 4; tGazeYR = petScore * 4; }
  }

  // Lids — asymmetric easing: closing fast, opening slow
  // Per-eye lag filter (creates natural L/R phase offset)
  tUpHL_f = lerp(tUpHL_f, tUpH, lidAlphaL);
  tUpHR_f = lerp(tUpHR_f, tUpH, lidAlphaR);
  var closingSpeed = 0.14, openingSpeed = 0.08;
  // Gravity: opening from high positions starts slow (heavy lid), speeds up as it lifts
  var gravL = (tUpHL_f < dUpHL) ? Math.max(0.4, 1 - dUpHL / 55) : 1;
  var gravR = (tUpHR_f < dUpHR) ? Math.max(0.4, 1 - dUpHR / 55) : 1;
  if (!isWinkingL) dUpHL = lerp(dUpHL, tUpHL_f, tUpHL_f > dUpHL ? closingSpeed : openingSpeed * gravL);
  if (!isWinkingR) dUpHR = lerp(dUpHR, tUpHR_f, tUpHR_f > dUpHR ? closingSpeed : openingSpeed * gravR);
  dLoH = lerp(dLoH, tLoH, tLoH > dLoH ? closingSpeed : openingSpeed);
  applyLids();

  // Breath — shared computation used by pupil coupling and transform scale
  var t = Date.now();
  var breathPeriod = BREATH[currentLife.label] || 4000;
  var breathVal    = breathWave(t, breathPeriod);
  var breathScale  = 0.992 + breathVal * 0.016;

  // Pupil ry: state-driven + subtle breath swell; rx: dilation
  dPupRy = lerp(dPupRy, tPupRy, 0.08);
  dPupRx = lerp(dPupRx, tPupRx, 0.10);
  pL.setAttribute('ry', (dPupRy + breathVal * 0.5).toFixed(2));
  pR.setAttribute('ry', (dPupRy + breathVal * 0.5).toFixed(2));
  pL.setAttribute('rx', dPupRx.toFixed(2));
  pR.setAttribute('rx', dPupRx.toFixed(2));
  // Iris ry: animate constriction/dilation (surprise flash, long-press dilation)
  dIrisRy = lerp(dIrisRy, tIrisRy, 0.09);
  iL.setAttribute('ry', dIrisRy.toFixed(1));
  iR.setAttribute('ry', dIrisRy.toFixed(1));

  // Gaze — spring physics, state-dependent stiffness/damping
  var sp = GAZE_SPRING[currentLife.label] || [0.15, 0.80];
  var gs = sp[0], gd = sp[1];
  gazeVelXL += (tGazeXL - dGazeXL) * gs; gazeVelXL *= gd; dGazeXL += gazeVelXL;
  gazeVelYL += (tGazeYL - dGazeYL) * gs; gazeVelYL *= gd; dGazeYL += gazeVelYL;
  gazeVelXR += (tGazeXR - dGazeXR) * gs; gazeVelXR *= gd; dGazeXR += gazeVelXR;
  gazeVelYR += (tGazeYR - dGazeYR) * gs; gazeVelYR *= gd; dGazeYR += gazeVelYR;

  // Nystagmus — zzz only: slow drift → snap back (sleep eye oscillation)
  if (currentLife.label === 'zzz' && !isExpressing && !isSurprised) {
    if (!nysSnapping) {
      nysOffset += nysDir * 0.06;
      if (Math.abs(nysOffset) >= nysTarget) nysSnapping = true;
    } else {
      nysOffset = lerp(nysOffset, 0, 0.20);
      if (Math.abs(nysOffset) < 0.3) {
        nysSnapping = false;
        nysDir = Math.random() > 0.5 ? 1 : -1;
        nysTarget = 3 + Math.random() * 4;
        nysOffset = 0;
      }
    }
  } else {
    nysOffset = lerp(nysOffset, 0, 0.12);
  }

  // Convergence: looking down = near object → eyes drift inward slightly
  var conv = (!isExpressing && !isSurprised) ? Math.max(0, mouseGazeY) * 0.35 : 0;

  var vorX = Math.max(-5, Math.min(5, -dGyroX * 0.22));
  var pLx = 75  + dGazeXL + conv + vorX + nysOffset, pLy = 70 + dGazeYL;
  var pRx = 245 + dGazeXR - conv + vorX + nysOffset, pRy = 70 + dGazeYR;
  pL.setAttribute('cx', pLx.toFixed(1)); pL.setAttribute('cy', pLy.toFixed(1));
  pR.setAttribute('cx', pRx.toFixed(1)); pR.setAttribute('cy', pRy.toFixed(1));
  iL.setAttribute('cx', pLx.toFixed(1)); iL.setAttribute('cy', pLy.toFixed(1));
  iR.setAttribute('cx', pRx.toFixed(1)); iR.setAttribute('cy', pRy.toFixed(1));

  // Gyro + float + tilt
  var gyroDiff = gyroX - dGyroX;
  var gyroPull = Math.min(Math.abs(gyroDiff) / 8, 1);
  gyroVelX += gyroDiff * 0.038 * gyroPull;
  gyroVelX *= 0.82;
  dGyroX    += gyroVelX;
  dTilt       = lerp(dTilt, tTilt, 0.015);
  blinkWobble = lerp(blinkWobble, blinkWobbleTarget, 0.09);
  var tiltMag = Math.abs(dTilt) / 3.5;
  var floatY  = (Math.sin(t / 2800) * 10 + Math.sin(t / 1700) * 4) * (1 - tiltMag * 0.6);
  var tremor  = (Math.random() - 0.5) * 0.45;
  var dispX   = tremor;
  var lean    = dGyroX * 0.07;
  eyeWrap.style.transform =
    'translate(calc(-50% + ' + dispX.toFixed(2) + 'px), calc(-50% + ' + floatY.toFixed(1) + 'px))' +
    ' rotate(' + (lean + dTilt + blinkWobble).toFixed(2) + 'deg)' +
    ' scale(' + breathScale.toFixed(4) + ')';

  requestAnimationFrame(loop);
}

// ── Clock + hourly state refresh ─────────────────────────────────
function updateClock() {
  var now = new Date();
  var hh  = String(now.getHours()).padStart(2,'0');
  var mm  = String(now.getMinutes()).padStart(2,'0');
  clockEl.textContent = hh+':'+mm;
  cBR.textContent     = hh+':'+mm;
  currentLife = getLife(now.getHours());
  applyLife(currentLife);
}

// ── Init ─────────────────────────────────────────────────────────
dUpHL = dUpHR = currentLife.upH;
dLoH  = currentLife.loH;
dPupRy = currentLife.pupRy;
applyLife(currentLife);
applyLids();
pL.setAttribute('ry', dPupRy); pR.setAttribute('ry', dPupRy);

updateClock();
setInterval(updateClock, 30000);
scheduleBlink();
scheduleAutoGaze();
scheduleHeadTilt();
scheduleMicroSaccade();

// ── Wake button (force half-open lids) ───────────────────────────
var wakeBtn = document.getElementById('wakeBtn');
var awakeMode = false;
wakeBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  awakeMode = !awakeMode;
  wakeBtn.classList.toggle('on', awakeMode);
  wakeBtn.textContent = awakeMode ? '○' : 'z';
});

// ── Camera eye contact (MediaPipe Face Landmarker) ───────────────
var camVid = document.getElementById('camVid');
var camBtn = document.getElementById('camBtn');
var camActive = false;
var faceLandmarker = null;
var faceGazeX = 0, faceGazeY = 0;

var camErr = document.getElementById('camErr');
function showCamErr(msg) {
  camErr.textContent = msg;
  camErr.style.display = 'block';
  setTimeout(function(){ camErr.style.display = 'none'; }, 6000);
}

async function loadFaceLandmarker(modelMod, fileset, delegate) {
  return await modelMod.FaceLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
      delegate: delegate
    },
    runningMode: 'VIDEO',
    numFaces: 1
  });
}

async function startFaceTracking() {
  camBtn.classList.add('loading');
  try {
    var stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 320, height: 240, facingMode: 'user' }, audio: false
      });
    } catch (eCam) {
      throw new Error('CAMERA: ' + (eCam.name || eCam.message || 'denied'));
    }
    camVid.srcObject = stream;
    await camVid.play();

    if (!faceLandmarker) {
      var mod;
      try {
        mod = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/vision_bundle.mjs');
      } catch (eImp) {
        throw new Error('IMPORT: ' + (eImp.message || 'blocked'));
      }
      var fileset;
      try {
        fileset = await mod.FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm'
        );
      } catch (eFs) {
        throw new Error('WASM: ' + (eFs.message || 'failed'));
      }
      try {
        faceLandmarker = await loadFaceLandmarker(mod, fileset, 'GPU');
      } catch (eGpu) {
        try {
          faceLandmarker = await loadFaceLandmarker(mod, fileset, 'CPU');
        } catch (eCpu) {
          throw new Error('MODEL: ' + (eCpu.message || eGpu.message || 'failed'));
        }
      }
    }

    camActive = true;
    camBtn.classList.remove('loading');
    camBtn.classList.add('on');
    camBtn.textContent = '●';
    tPupRx = 3.5;  // 対光反射: カメラ起動で縮瞳
    detectLoop();
  } catch (e) {
    camBtn.classList.remove('loading');
    if (camVid.srcObject) {
      camVid.srcObject.getTracks().forEach(function(t) { t.stop(); });
      camVid.srcObject = null;
    }
    showCamErr(String(e.message || e));
    console.error('face tracking failed', e);
  }
}

function stopFaceTracking() {
  camActive = false;
  if (camVid.srcObject) {
    camVid.srcObject.getTracks().forEach(function(t) { t.stop(); });
    camVid.srcObject = null;
  }
  faceGazeX = 0; faceGazeY = 0;
  camBtn.classList.remove('on');
  camBtn.textContent = '◯';
  tPupRx = 5;
}

function detectLoop() {
  if (!camActive) return;
  if (faceLandmarker && camVid.readyState >= 2) {
    try {
      var result = faceLandmarker.detectForVideo(camVid, performance.now());
      if (result.faceLandmarks && result.faceLandmarks.length > 0) {
        var nose = result.faceLandmarks[0][1];  // nose tip
        var faceX = 1 - nose.x;                 // mirror
        var faceY = nose.y;
        faceGazeX = Math.max(-22, Math.min(22, (faceX - 0.5) * 44));
        faceGazeY = Math.max(-9,  Math.min(9,  (faceY - 0.5) * 18));
        if (!isTouching && !isSurprised && !isExpressing) {
          tGazeXL = faceGazeX; tGazeXR = faceGazeX;
          tGazeYL = faceGazeY; tGazeYR = faceGazeY;
        }
      }
    } catch (e) { /* skip this frame */ }
  }
  requestAnimationFrame(detectLoop);
}

camBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  if (camActive) stopFaceTracking();
  else           startFaceTracking();
});

setInterval(dozeCheck, 10000);
fetchWeather();
setInterval(fetchWeather, 30 * 60 * 1000);
loop();
</script>
